<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LMU 캠퍼스 지도 — Loyola Marymount University</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#F2ECE1;
    --parchment-2:#E9E0D2;
    --ink:#1C2438;
    --crimson:#7E1F2C;
    --crimson-dark:#5E1620;
    --teal:#2E9C95;
    --teal-dark:#21746F;
    --gold:#C8973A;
    --slate:#8A8F98;
    --line:rgba(28,36,56,0.12);
    --shadow:0 10px 30px rgba(28,36,56,0.18);
    --font-display:'Fraunces','Noto Serif KR',serif;
    --font-body:'Inter','Noto Sans KR',sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--parchment);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  a{color:inherit;}
  button{font-family:inherit;}
  :focus-visible{outline:3px solid var(--teal); outline-offset:2px; border-radius:4px;}

  /* ---------- header ---------- */
  header.top{
    position:sticky; top:0; z-index:40;
    background:linear-gradient(180deg, var(--crimson) 0%, var(--crimson-dark) 100%);
    color:#fff;
    padding:14px 18px 12px;
    box-shadow:0 4px 16px rgba(0,0,0,0.18);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .crest{flex:0 0 auto; width:40px; height:40px;}
  .brand h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:19px;
    line-height:1.15;
    margin:0;
    letter-spacing:0.2px;
  }
  .brand .sub{
    font-family:var(--font-body);
    font-size:12.5px;
    opacity:0.86;
    margin-top:2px;
    font-weight:500;
  }
  .brand .kr{
    font-family:'Noto Serif KR', var(--font-display);
    font-size:13.5px;
    opacity:0.92;
    margin-top:3px;
    font-weight:600;
  }

  /* ---------- toolbar ---------- */
  .toolbar{
    position:sticky; top:0; z-index:39;
    background:var(--parchment);
    border-bottom:1px solid var(--line);
    padding:10px 14px;
  }
  .searchwrap{
    position:relative;
    display:flex; align-items:center;
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:999px;
    padding:9px 14px;
    gap:8px;
    box-shadow:0 1px 0 rgba(28,36,56,0.04) inset;
  }
  .searchwrap svg{flex:0 0 auto; opacity:0.55;}
  .searchwrap input{
    border:none; outline:none; background:transparent;
    font-family:var(--font-body); font-size:15px; color:var(--ink);
    width:100%;
  }
  .searchwrap input::placeholder{color:#9a9588;}
  .clearbtn{
    border:none; background:var(--parchment-2); color:var(--ink);
    width:22px;height:22px;border-radius:50%;
    font-size:13px; line-height:1; cursor:pointer; display:none;
    flex:0 0 auto;
  }
  .chips{
    display:flex; gap:7px; margin-top:9px; overflow-x:auto; padding-bottom:2px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    border:1.5px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-family:var(--font-body); font-weight:600; font-size:12.5px;
    padding:6px 12px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s, color .15s, border-color .15s;
  }
  .chip[aria-pressed="true"]{
    background:var(--ink); border-color:var(--ink); color:#fff;
  }
  .chip .dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle;}

  /* ---------- map viewer ---------- */
  .mapwrap{
    position:relative;
    width:100%;
    height:62vh;
    min-height:380px;
    overflow:hidden;
    background:#0e1320;
    touch-action:none;
    cursor:grab;
  }
  .mapwrap.dragging{cursor:grabbing;}
  .mapstage{
    position:absolute; left:0; top:0;
    transform-origin:0 0;
    will-change:transform;
  }
  .mapstage img{
    display:block;
    width:986px;
    max-width:none;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }

  .pin{
    position:absolute;
    transform:translate(-50%,-100%);
    cursor:pointer;
    border:none;
    background:none;
    padding:0;
    line-height:0;
  }
  .pin .badge{
    display:flex; align-items:center; justify-content:center;
    width:25px; height:25px;
    border-radius:50%;
    color:#fff;
    font-family:var(--font-body); font-weight:700; font-size:11px;
    border:2px solid rgba(255,255,255,0.85);
    box-shadow:0 2px 6px rgba(0,0,0,0.45);
    transition:transform .12s ease;
  }
  .pin:hover .badge, .pin:focus-visible .badge{transform:scale(1.18);}
  .pin[data-cat="building"] .badge{background:var(--crimson);}
  .pin[data-cat="event"] .badge{background:var(--gold);}
  .pin[data-cat="dorm"] .badge{background:var(--teal-dark);}
  .pin[data-cat="amenity"] .badge{background:var(--ink);}
  .pin[data-cat="unknown"] .badge{
    background:rgba(138,143,152,0.55);
    width:16px; height:16px; font-size:0;
    border-width:1.5px;
  }
  .pin.alumni .badge{
    background:#2563eb; width:20px; height:20px; border-width:3px;
  }
  .pin.dimmed{opacity:0.22;}
  .pin.matched .badge{
    box-shadow:0 0 0 4px rgba(46,156,149,0.45), 0 2px 6px rgba(0,0,0,0.45);
  }
  .pin.active .badge{
    box-shadow:0 0 0 5px rgba(46,156,149,0.55), 0 2px 8px rgba(0,0,0,0.5);
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(46,156,149,0.55), 0 2px 6px rgba(0,0,0,0.45);}
    70%{box-shadow:0 0 0 10px rgba(46,156,149,0), 0 2px 6px rgba(0,0,0,0.45);}
    100%{box-shadow:0 0 0 0 rgba(46,156,149,0), 0 2px 6px rgba(0,0,0,0.45);}
  }
  .pin.matched .badge, .pin.active .badge{animation:pulse 1.6s ease-out infinite;}

  .mapcontrols{
    position:absolute; right:12px; bottom:14px; z-index:5;
    display:flex; flex-direction:column; gap:6px;
  }
  .mapcontrols button{
    width:38px; height:38px;
    border-radius:10px;
    border:none;
    background:rgba(28,36,56,0.78);
    color:#fff;
    font-size:18px;
    cursor:pointer;
    backdrop-filter:blur(2px);
  }
  .mapcontrols button:active{background:rgba(28,36,56,0.95);}
  .maphint{
    position:absolute; left:12px; bottom:14px; z-index:5;
    background:rgba(28,36,56,0.6);
    color:#fff; font-size:11.5px;
    padding:6px 10px; border-radius:8px;
    pointer-events:none;
  }

  .popup{
    position:absolute; z-index:20;
    transform:translate(-50%,-100%);
    background:#fff;
    border-radius:12px;
    box-shadow:var(--shadow);
    padding:10px 14px 11px;
    max-width:240px;
    min-width:140px;
    pointer-events:none;
    opacity:0; transition:opacity .12s ease;
  }
  .popup.show{opacity:1;}
  .popup .pnum{
    display:inline-block;
    font-family:var(--font-body); font-weight:700; font-size:11px;
    color:#fff; background:var(--ink);
    border-radius:6px; padding:1px 7px; margin-bottom:5px;
  }
  .popup .pname{font-family:var(--font-display); font-weight:600; font-size:14.5px; line-height:1.25;}
  .popup .psub{font-size:11.5px; color:#6b6557; margin-top:3px; line-height:1.3;}
  .popup .pnone{font-size:12px; color:#9a9588; margin-top:2px;}
  .popup::after{
    content:''; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%);
    width:12px; height:12px; background:#fff;
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }

  /* ---------- directory ---------- */
  main.directory{padding:22px 16px 50px;}
  .dirgroup{margin-bottom:26px;}
  .dirgroup h2{
    font-family:var(--font-display); font-weight:700; font-size:18px;
    margin:0 0 3px; display:flex; align-items:center; gap:8px;
  }
  .dirgroup h2 .swatch{width:11px;height:11px;border-radius:50%;display:inline-block;}
  .dirgroup .count{font-family:var(--font-body); font-weight:500; font-size:12px; color:#867f6f; margin:0 0 12px;}
  .dirgrid{display:grid; grid-template-columns:1fr; gap:9px;}
  @media(min-width:640px){.dirgrid{grid-template-columns:1fr 1fr;}}
  @media(min-width:980px){.dirgrid{grid-template-columns:1fr 1fr 1fr;}}

  .card{
    display:flex; align-items:flex-start; gap:11px;
    background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:11px 13px; text-align:left; cursor:pointer;
    transition:border-color .12s, transform .12s, box-shadow .12s;
  }
  .card:hover{border-color:var(--teal); box-shadow:0 4px 14px rgba(28,36,56,0.08); transform:translateY(-1px);}
  .card.hidden{display:none;}
  .card .num{
    flex:0 0 auto; width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:12px; font-family:var(--font-body);
  }
  .card[data-cat="building"] .num{background:var(--crimson);}
  .card[data-cat="event"] .num{background:var(--gold);}
  .card[data-cat="dorm"] .num{background:var(--teal-dark);}
  .card[data-cat="amenity"] .num{background:var(--ink);}
  .card .name{font-family:var(--font-display); font-weight:600; font-size:14.5px; line-height:1.3; color:var(--ink);}
  .card .sub{font-size:12px; color:#867f6f; margin-top:2px; line-height:1.35;}

  .empty{
    text-align:center; padding:36px 10px; color:#9a9588; font-size:14px;
    display:none;
  }

  footer.note{
    border-top:1px solid var(--line);
    padding:18px 16px 32px;
    font-size:11.5px; color:#9a9588; line-height:1.6;
    max-width:640px;
  }
  footer.note b{color:#7c7868;}
</style>
</head>

": 43.89, "cat": "amenity"}, {"id": "A", "n": "A", "name": "Hannon Parking Lot", "sub": "", "x": 46.14, "y": 49.53, "cat": "amenity"}, {"id": "D", "n": "D", "name": "Life Sciences Building", "sub": "Parking Lot", "x": 71.5, "y": 36.11, "cat": "amenity"}];

const mapwrap = document.getElementById('mapwrap');
const mapstage = document.getElementById('mapstage');
const mapimg = document.getElementById('mapimg');
const pinlayer = document.getElementById('pinlayer');
const popup = document.getElementById('popup');

const IMG_W = 986, IMG_H = 1595;
let scale = 1, tx = 0, ty = 0;
let minScale = 0.4, maxScale = 5;

function fitToScreen(){
  const r = mapwrap.getBoundingClientRect();
  const s = Math.max(r.width / IMG_W, r.height / IMG_H * 0.62);
  minScale = Math.min(r.width / IMG_W, 0.6);
  scale = Math.max(r.width / IMG_W, 0.62);
  tx = (r.width - IMG_W*scale) / 2;
  ty = -(IMG_H*scale) * 0.30; // bias view toward the main campus, not the legend
  applyTransform();
}

function applyTransform(){
  mapstage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  // keep pins a constant on-screen size regardless of zoom
  document.querySelectorAll('.pin').forEach(p=>{
    p.style.setProperty('--counter', 1/scale);
  });
}

function clampPan(){
  const r = mapwrap.getBoundingClientRect();
  const w = IMG_W*scale, h = IMG_H*scale;
  const minTx = Math.min(r.width - w, 0) - 200;
  const maxTx = 200;
  const minTy = Math.min(r.height - h, 0) - 200;
  const maxTy = 200;
  tx = Math.min(maxTx, Math.max(minTx, tx));
  ty = Math.min(maxTy, Math.max(minTy, ty));
}

function zoomAt(clientX, clientY, factor){
  const r = mapwrap.getBoundingClientRect();
  const localX = clientX - r.left;
  const localY = clientY - r.top;
  const newScale = Math.min(maxScale, Math.max(minScale, scale*factor));
  const ratio = newScale/scale;
  tx = localX - (localX - tx)*ratio;
  ty = localY - (localY - ty)*ratio;
  scale = newScale;
  clampPan();
  applyTransform();
}

function panTo(xPct, yPct, targetScale){
  const r = mapwrap.getBoundingClientRect();
  const px = IMG_W * xPct/100;
  const py = IMG_H * yPct/100;
  scale = Math.min(maxScale, Math.max(minScale, targetScale));
  tx = r.width/2 - px*scale;
  ty = r.height/2 - py*scale;
  clampPan();
  applyTransform();
}

// ---- pointer pan ----
let dragging = false, lastX=0, lastY=0, moved=0;
let pinch = {active:false, dist:0, scale:1};

function pointFromTouches(t){
  return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
}

mapwrap.addEventListener('pointerdown', (e)=>{
  if(e.pointerType==='mouse' && e.button!==0) return;
  dragging = true; moved = 0;
  lastX = e.clientX; lastY = e.clientY;
  mapwrap.classList.add('dragging');
  mapwrap.setPointerCapture(e.pointerId);
});
mapwrap.addEventListener('pointermove', (e)=>{
  if(!dragging) return;
  const dx = e.clientX-lastX, dy = e.clientY-lastY;
  moved += Math.abs(dx)+Math.abs(dy);
  tx += dx; ty += dy;
  lastX = e.clientX; lastY = e.clientY;
  clampPan();
  applyTransform();
});
function endDrag(e){
  dragging=false;
  mapwrap.classList.remove('dragging');
}
mapwrap.addEventListener('pointerup', endDrag);
mapwrap.addEventListener('pointercancel', endDrag);
mapwrap.addEventListener('pointerleave', (e)=>{ if(dragging && e.pointerType==='mouse') endDrag(e); });

mapwrap.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoomAt(e.clientX, e.clientY, factor);
}, {passive:false});

// touch pinch
mapwrap.addEventListener('touchstart', (e)=>{
  if(e.touches.length===2){
    pinch.active = true;
    pinch.dist = pointFromTouches(e.touches);
    pinch.scale = scale;
  }
}, {passive:true});
mapwrap.addEventListener('touchmove', (e)=>{
  if(pinch.active && e.touches.length===2){
    e.preventDefault();
    const d = pointFromTouches(e.touches);
    const factor = d/pinch.dist;
    const cx = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy = (e.touches[0].clientY+e.touches[1].clientY)/2;
    const target = Math.min(maxScale, Math.max(minScale, pinch.scale*factor));
    zoomAt(cx, cy, target/scale);
  }
}, {passive:false});
mapwrap.addEventListener('touchend', (e)=>{
  if(e.touches.length<2) pinch.active = false;
}, {passive:true});

document.getElementById('zoomIn').addEventListener('click', ()=>{
  const r = mapwrap.getBoundingClientRect();
  zoomAt(r.left+r.width/2, r.top+r.height/2, 1.3);
});
document.getElementById('zoomOut').addEventListener('click', ()=>{
  const r = mapwrap.getBoundingClientRect();
  zoomAt(r.left+r.width/2, r.top+r.height/2, 1/1.3);
});
document.getElementById('zoomReset').addEventListener('click', ()=>{ fitToScreen(); closePopup(); setActive(null); });

// ---- pins ----
let activePin = null;

function setActive(id){
  activePin = id;
  document.querySelectorAll('.pin').forEach(p=>{
    p.classList.toggle('active', p.dataset.id===id);
  });
}

function showPopup(pin, anchorEl){
  const r = mapwrap.getBoundingClientRect();
  const a = anchorEl.getBoundingClientRect();
  let left = a.left - r.left + a.width/2;
  let top = a.top - r.top;
  popup.style.left = left+'px';
  popup.style.top = (top-6)+'px';
  if(pin.name){
    popup.innerHTML = `<div class="pnum">${pin.n || ''}</div><div class="pname">${pin.name}</div>` + (pin.sub? `<div class="psub">${pin.sub}</div>`:'');
  } else {
    popup.innerHTML = `<div class="pnum">${pin.n}</div><div class="pnone">범례에 이름 정보가 없는 위치입니다.</div>`;
  }
  popup.classList.add('show');
}
function closePopup(){ popup.classList.remove('show'); }

function renderPins(){
  pinlayer.innerHTML = '';
  PINS.forEach(pin=>{
    const btn = document.createElement('button');
    btn.className = 'pin' + (pin.special==='alumni' ? ' alumni' : '');
    btn.dataset.id = pin.id;
    btn.dataset.cat = pin.cat;
    btn.style.left = pin.x + '%';
    btn.style.top = pin.y + '%';
    btn.setAttribute('aria-label', pin.name || ('위치 ' + pin.n));
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.style.transform = 'scale(var(--counter,1))';
    if(pin.special!=='alumni') badge.textContent = pin.n;
    btn.appendChild(badge);
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      setActive(pin.id);
      showPopup(pin, btn);
      highlightCard(pin.id);
    });
    pinlayer.appendChild(btn);
  });
}

mapwrap.addEventListener('pointerdown', ()=>{ closePopup(); });
mapwrap.addEventListener('pointermove', ()=>{ if(dragging && moved>4) closePopup(); });

// ---- directory ----
const directory = document.getElementById('directory');
const GROUP_ORDER = [
  {cat:'building', title:'건물 및 기타 (Academic Buildings & Miscellaneous)'},
  {cat:'event', title:'이벤트 공간 (Event Areas)'},
  {cat:'dorm', title:'기숙사 (Residence Halls)'},
  {cat:'amenity', title:'방문자 주차장 (Visitor Parking)'},
];
const SWATCH = {building:'var(--crimson)', event:'var(--gold)', dorm:'var(--teal-dark)', amenity:'var(--ink)'};

function buildDirectory(){
  directory.innerHTML='';
  GROUP_ORDER.forEach(g=>{
    const items = PINS.filter(p=>p.cat===g.cat && p.name);
    if(items.length===0) return;
    const group = document.createElement('div');
    group.className = 'dirgroup';
    group.dataset.cat = g.cat;
    group.innerHTML = `<h2><span class="swatch" style="background:${SWATCH[g.cat]}"></span>${g.title}</h2><p class="count">${items.length}곳</p>`;
    const grid = document.createElement('div');
    grid.className = 'dirgrid';
    items.forEach(pin=>{
      const card = document.createElement('button');
      card.className = 'card';
      card.dataset.cat = pin.cat;
      card.dataset.id = pin.id;
      card.dataset.search = (pin.n+' '+pin.name+' '+(pin.sub||'')).toLowerCase();
      card.innerHTML = `<div class="num">${pin.n}</div><div><div class="name">${pin.name}</div>${pin.sub?`<div class="sub">${pin.sub}</div>`:''}</div>`;
      card.addEventListener('click', ()=>{
        const targetScale = Math.max(2.0, minScale*2.2);
        panTo(pin.x, pin.y, targetScale);
        setActive(pin.id);
        setTimeout(()=>{
          const el = pinlayer.querySelector(`.pin[data-id="${pin.id}"]`);
          if(el) showPopup(pin, el);
        }, 60);
        mapwrap.scrollIntoView({behavior:'smooth', block:'center'});
      });
      grid.appendChild(card);
    });
    group.appendChild(grid);
    directory.appendChild(group);
  });
}

function highlightCard(id){
  document.querySelectorAll('.card').forEach(c=>{
    c.style.borderColor = c.dataset.id===id ? 'var(--teal)' : '';
  });
}

// ---- search & filter ----
const search = document.getElementById('search');
const clearBtn = document.getElementById('clearSearch');
const emptyState = document.getElementById('emptyState');
let activeCat = 'all';

function applyFilter(){
  const q = search.value.trim().toLowerCase();
  clearBtn.style.display = q ? 'block' : 'none';
  let visibleCount = 0;

  document.querySelectorAll('.dirgroup').forEach(g=>{
    const catOk = activeCat==='all' || g.dataset.cat===activeCat;
    let groupHasVisible = false;
    g.querySelectorAll('.card').forEach(c=>{
      const matches = (!q || c.dataset.search.includes(q));
      const show = catOk && matches;
      c.classList.toggle('hidden', !show);
      if(show){ groupHasVisible = true; visibleCount++; }
    });
    g.style.display = groupHasVisible ? '' : 'none';
  });
  emptyState.style.display = visibleCount===0 ? 'block' : 'none';

  document.querySelectorAll('.pin').forEach(p=>{
    const pin = PINS.find(x=>x.id===p.dataset.id);
    const inCat = activeCat==='all' || pin.cat===activeCat;
    const text = (pin.n+' '+(pin.name||'')+' '+(pin.sub||'')).toLowerCase();
    const matches = !q || text.includes(q);
    p.classList.toggle('matched', !!q && matches && inCat && !!pin.name);
    p.classList.toggle('dimmed', !inCat || (q && !matches));
  });
}

search.addEventListener('input', applyFilter);
clearBtn.addEventListener('click', ()=>{ search.value=''; applyFilter(); search.focus(); });

document.getElementById('chips').addEventListener('click', (e)=>{
  const chip = e.target.closest('.chip');
  if(!chip) return;
  activeCat = chip.dataset.cat;
  document.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed', c===chip ? 'true':'false'));
  applyFilter();
});

// ---- init ----
renderPins();
buildDirectory();
fitToScreen();
applyFilter();
window.addEventListener('resize', ()=>{ fitToScreen(); });
